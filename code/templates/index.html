<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Management System</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎫</text></svg>">
    <script
      type="text/javascript"
      src="{{ url_for('static', filename='script.js') }}"
      defer
    ></script>
  </head>
  <body>
    <header>
      <h1>Event Management System</h1>
    </header>
    <main>
      <section id="operations">
        <div class="operation">
          <h2>Add New Customer</h2>
          <form id="addCustomerForm">
            <input
              type="text"
              id="customerFirstName"
              placeholder="First Name"
              required
              autocomplete="given-name"
            />
            <input
              type="text"
              id="customerLastName"
              placeholder="Last Name"
              required
              autocomplete="family-name"
            />
            <input
              type="email"
              id="customerEmail"
              placeholder="Email Address"
              required
              autocomplete="email"
            />
            <input
              type="text"
              id="customerCredit"
              placeholder="Credit Card Info (optional)"
              autocomplete="cc-number"
            />
            <button type="submit">Add Customer</button>
          </form>
        </div>

        <div class="operation">
          <h2>Create New Event</h2>
          <form id="addEventForm">
            <input
              type="text"
              id="eventName"
              placeholder="Event Name"
              required
            />
            <input 
              type="text" 
              id="eventType" 
              placeholder="Event Type (Concert, Theater, Sports...)" 
              required 
            />
            <label>Event Time</label>
            <input type="time" id="eventTime" required />
            <label>Event Date</label>
            <input type="date" id="eventDate" required />
            <input
              type="number"
              id="eventCapacity"
              placeholder="Total Capacity"
              min="1"
              required
            />
            <label>Seat Configuration</label>
            <input
              type="number"
              id="VIP_Capacity"
              placeholder="Number of VIP seats"
              min="0"
              required
            />
            <input
              type="number"
              id="FrontRow_Capacity"
              placeholder="Number of Front Row seats"
              min="0"
              required
            />
            <input
              type="number"
              id="Normal_Capacity"
              placeholder="Number of Regular seats"
              min="0"
              required
            />
            <label>Pricing (€)</label>
            <input
              type="number"
              step="0.01"
              id="VIP_Price"
              placeholder="VIP seat price"
              min="0"
              required
            />
            <input
              type="number"
              step="0.01"
              id="FrontRow_Price"
              placeholder="Front Row seat price"
              min="0"
              required
            />
            <input
              type="number"
              step="0.01"
              id="Normal_Price"
              placeholder="Regular seat price"
              min="0"
              required
            />
            <button type="submit">Create Event</button>
          </form>
        </div>

        <div class="operation">
          <h2>Book Tickets</h2>
          <form id="bookTicketsForm">
            <label>Select Event</label>
            <select id="bookEventIdselect" name="event_select" required>
              <option value="">Choose an event...</option>
            </select>
            <input
              type="email"
              id="customerIdmail"
              placeholder="Customer Email"
              required
            />
            <input
              type="number"
              step="1"
              id="numOfTickets"
              placeholder="Number of Tickets"
              min="1"
              oninput="update_tickets_chooser()"
              required
            />
            <div id="bookTicketsFormdiv"></div>
            <button type="submit">Book Tickets</button>
          </form>
        </div>

        <div class="operation">
          <h2>Search Available Seats</h2>
          <form id="searchSeatsForm">
            <label>Select Event</label>
            <select id="searchSeatsIdselect" name="seats_select" required>
              <option value="">Choose an event...</option>
            </select>
            <button type="submit">Search Available Seats</button>
          </form>
          <div id="availableSeatsResult_container"></div>
        </div>

        <div class="operation">
          <h2>Cancel Event</h2>
          <form id="cancelEventForm">
            <label>Select Event to Cancel</label>
            <select id="cancelEventIdselect" name="cancel_select" required>
              <option value="">Choose an event...</option>
            </select>
            <button type="submit">Cancel Event & Refund All</button>
          </form>
        </div>

        <div class="operation">
          <h2>Cancel Reservation</h2>
          <form id="cancelReservationForm">
            <input
              type="email"
              id="customerEmailCancel"
              placeholder="Customer Email"
              required
            />
            <button type="submit">Cancel All Reservations</button>
          </form>
        </div>

        <div class="operation">
          <h2>View Revenue</h2>
          <form id="profitsForm">
            <label>Filter by Event</label>
            <select id="pes" name="profit_select" required>
              <option value="All">All Events</option>
            </select>
            <label>Filter by Ticket Type</label>
            <select id="pts" name="profit_type_select" required>
              <option value="All">All Ticket Types</option>
              <option value="VIP">VIP Only</option>
            </select>
            <button type="submit">Calculate Revenue</button>
          </form>
          <div id="eventSProfits_container"></div>
        </div>

        <div class="operation">
          <h2>Active Reservations Report</h2>
          <form id="viewReservationsForm">
            <label>Start Date</label>
            <input type="date" id="eventDateS" required />
            <label>End Date</label>
            <input type="date" id="eventDateF" required />
            <button type="submit">View Reservations</button>
          </form>
          <div id="ActiveReservationsResult_container"></div>
        </div>

        <div class="operation">
          <h2>Analytics & Statistics</h2>
          <button id="mostPopularEvent">Most Popular Event</button>
          <button id="highestProfitEvent">Highest Revenue Event</button>
          <button id="refresh_render">Refresh All Data</button>
        </div>

        <div id="customers_container" class="operation">
          <h2>Customers</h2>
        </div>
        <div id="events_container" class="operation">
          <h2>Events</h2>
        </div>
        <div id="tickets_container" class="operation">
          <h2>Tickets</h2>
        </div>
        <div id="reservations_container" class="operation">
          <h2>Reservations</h2>
        </div>
      </section>
    </main>
  </body>
</html>
